<!-- shekinahNavbar.html - Navbar para SHEKINAH con navegación tipo step indicators -->
<header class="shekinah-header" id="shekinahNavbar">
  <div class="shekinah-header-container">
    <!-- Logo y menú hamburguesa -->
    <div class="shekinah-header-left">
      <span class="material-symbols-outlined shekinah-menu-icon" id="shekinahMenuToggle">menu</span>
      <h1 class="shekinah-brand-title">SHEKINAH</h1>
    </div>
    
    <!-- Navegación centrada (visible en escritorio) - ESTILO STEP INDICATOR -->
    <nav class="shekinah-main-nav" id="shekinahNavMenu">
      <a href="#slide-0" class="shekinah-nav-link active" data-nav="0">
        <span class="nav-number"></span>
        <span class="nav-label">Inicio</span>
      </a>
      <a href="#slide-1" class="shekinah-nav-link" data-nav="1">
        <span class="nav-number"></span>
        <span class="nav-label">Servicios</span>
      </a>
      <a href="#slide-2" class="shekinah-nav-link" data-nav="2">
        <span class="nav-number"></span>
        <span class="nav-label">Nosotros</span>
      </a>
      <a href="#slide-3" class="shekinah-nav-link" data-nav="3">
        <span class="nav-number"></span>
        <span class="nav-label">Importación</span>
      </a>
    </nav>
    
    <!-- Avatar/Perfil -->
    <div class="shekinah-header-right">
      <div class="shekinah-avatar" id="shekinahUserAvatar">
        <span class="material-symbols-outlined shekinah-avatar-icon">person</span>
      </div>
    </div>
  </div>
</header>

<!-- Menú móvil -->
<div class="shekinah-mobile-menu" id="shekinahMobileMenu">
  <nav class="shekinah-mobile-nav">
    <a href="#slide-0" class="shekinah-nav-link active" data-nav="0">
      <span class="nav-number"></span>
      <span class="nav-label">Inicio</span>
    </a>
    <a href="#slide-1" class="shekinah-nav-link" data-nav="1">
      <span class="nav-number"></span>
      <span class="nav-label">Servicios</span>
    </a>
    <a href="#slide-2" class="shekinah-nav-link" data-nav="2">
      <span class="nav-number"></span>
      <span class="nav-label">Nosotros</span>
    </a>
    <a href="#slide-3" class="shekinah-nav-link" data-nav="3">
      <span class="nav-number"></span>
      <span class="nav-label">Importación</span>
    </a>
  </nav>
</div>
